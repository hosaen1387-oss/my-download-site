<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مرکز آموزش برنامه‌نویسی</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #0d0d0d;
            color: #eee;
            transition: 0.3s;
        }

        /* نوار منو */
        .navbar {
            background: #1a1a1a;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #7a00ff;
        }

        .navbar .logo {
            font-size: 22px;
            font-weight: bold;
            color: #b366ff;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .navbar ul li a {
            color: #ccc;
            text-decoration: none;
            font-size: 16px;
            transition: 0.2s;
        }

        .navbar ul li a:hover {
            color: #b366ff;
        }

        /* دکمه دارک مود */
        .toggle-btn {
            background: #7a00ff;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .toggle-btn:hover {
            background: #9d4dff;
        }

        /* محتوای اصلی */
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #1a1a1a;
            padding: 25px 30px;
            border-radius: 10px;
            border: 1px solid #7a00ff;
            box-shadow: 0 0 15px rgba(122,0,255,0.3);
        }

        h1 {
            text-align: center;
            color: #b366ff;
        }

        p {
            text-align: center;
            color: #ccc;
        }

        /* حالت روشن */
        body.light {
            background: #f5f5f5;
            color: #222;
        }

        body.light .navbar {
            background: #fff;
            border-bottom-color: #b366ff;
        }

        body.light .container {
            background: #fff;
            border-color: #b366ff;
            box-shadow: 0 0 15px rgba(179,102,255,0.3);
        }

        body.light .navbar ul li a {
            color: #444;
        }

        body.light .navbar ul li a:hover {
            color: #7a00ff;
        }
    </style>
</head>

<body>

    <!-- نوار منو -->
    <div class="navbar">
        <div class="logo">Hosaen Dev</div>

        <ul>
            <li><a href="#">صفحه اصلی</a></li>
            <li><a href="#">آموزش‌ها</a></li>
            <li><a href="#">مقالات</a></li>
            <li><a href="#">درباره من</a></li>
        </ul>

        <button class="toggle-btn" onclick="toggleMode()">تغییر حالت</button>
    </div>

    <!-- محتوای اصلی -->
    <div class="container">
        <h1>مرکز آموزش برنامه‌نویسی</h1>
        <p>به دنیای برنامه‌نویسی خوش آمدی! به‌زودی آموزش‌های جذاب اینجا قرار می‌گیرند.</p>
    </div>

    <script>
        function toggleMode() {
            document.body.classList.toggle("light");
        }
    </script>

</body>
</html>
