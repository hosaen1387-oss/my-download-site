<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دانلود فایل‌ها</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            background: #fff;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
        }
        p.desc {
            text-align: center;
            color: #555;
            margin-top: 0;
            margin-bottom: 25px;
        }
        ul.files {
            list-style: none;
            padding: 0;
        }
        ul.files li {
            background: #f0f0f0;
            margin-bottom: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        ul.files li a {
            text-decoration: none;
            color: #0066cc;
            font-weight: bold;
        }
        ul.files li span.size {
            color: #777;
            font-size: 0.9em;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85em;
            color: #777;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>مرکز دانلود فایل‌ها</h1>
    <p class="desc">از لیست زیر هر فایلی را خواستی انتخاب و دانلود کن.</p>

    <ul class="files">
        <li>
            <a href="files/file1.pdf" download>دانلود فایل شماره ۱ (PDF)</a>
            <span class="size">مثلاً ۲ مگابایت</span>
        </li>
        <li>
            <a href="files/file2.zip" download>دانلود فایل شماره ۲ (ZIP)</a>
            <span class="size">مثلاً ۵ مگابایت</span>
        </li>
        <li>
            <a href="files/file3.mp4" download>دانلود ویدیو نمونه</a>
            <span class="size">مثلاً ۲۰ مگابایت</span>
        </li>
    </ul>

    <div class="footer">
        ساخته شده توسط من 😊
    </div>
</div>

</body>
</html>
